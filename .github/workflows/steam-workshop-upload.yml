name: Upload Steam Workshop

permissions:
  contents: read

on:
  push:
    branches:
      - v3-framework
    paths:
      - ArcaneShipCores/src/**
      - ShipCoreFramework/src/**
  workflow_dispatch:
    inputs:
      target:
        description: "Which workshop item to upload"
        required: true
        default: both
        type: choice
        options:
          - both
          - arcane-cores
          - shipcore-framework
      sbmi_profile:
        description: "Metadata profile file to use"
        required: true
        default: beta
        type: choice
        options:
          - beta
          - main

jobs:
  upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: arcane-cores
            mod_dir: ArcaneShipCores
            src_dir: ArcaneShipCores/src
          - key: shipcore-framework
            mod_dir: ShipCoreFramework
            src_dir: ShipCoreFramework/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether this matrix target should upload
        id: matrix_gate
        shell: bash
        run: |
          set -euo pipefail

          SHOULD_UPLOAD=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.target }}" = "both" ] || [ "${{ github.event.inputs.target }}" = "${{ matrix.key }}" ]; then
              SHOULD_UPLOAD=true
            fi
          else
            BEFORE_SHA="${{ github.event.before }}"
            CURRENT_SHA="${{ github.sha }}"

            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              if git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
                if git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" -- "${{ matrix.src_dir }}/" | grep -q .; then
                  SHOULD_UPLOAD=true
                fi
              else
                echo "Previous SHA '$BEFORE_SHA' is not available in this checkout. Forcing upload to avoid missing workshop updates."
                SHOULD_UPLOAD=true
              fi
            else
              if git ls-tree -r --name-only "$CURRENT_SHA" -- "${{ matrix.src_dir }}/" | grep -q .; then
                SHOULD_UPLOAD=true
              fi
            fi
          fi

          echo "should_upload=$SHOULD_UPLOAD" >> "$GITHUB_OUTPUT"
          echo "Matrix target '${{ matrix.key }}' upload decision: $SHOULD_UPLOAD"

      - name: Validate required secrets
        if: ${{ steps.matrix_gate.outputs.should_upload == 'true' }}
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          [ -n "${{ secrets.STEAM_USERNAME }}" ] || { echo "Missing secret: STEAM_USERNAME"; exit 1; }
          [ -n "${STEAM_CONFIG_VDF:-}" ] || { echo "Missing secret: STEAM_CONFIG_VDF"; exit 1; }
          echo "::add-mask::$STEAM_CONFIG_VDF"
          echo "Using cached SteamCMD host config authentication for workshop upload."

      - name: Build upload content from src only
        if: ${{ steps.matrix_gate.outputs.should_upload == 'true' }}
        env:
          SBMI_PROFILE: ${{ github.event.inputs.sbmi_profile || 'beta' }}
        run: |
          set -euo pipefail
          STAGING="${RUNNER_TEMP}/${{ matrix.mod_dir }}-upload"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"

          rsync -a --delete "${{ matrix.src_dir }}/" "$STAGING/"

          PROFILE_FILE="${{ matrix.src_dir }}/modinfo.sbmi.${SBMI_PROFILE}"
          if [ ! -f "$PROFILE_FILE" ]; then
            echo "Expected metadata profile not found: $PROFILE_FILE"
            exit 1
          fi

          cp "$PROFILE_FILE" "$STAGING/modinfo.sbmi"

          THUMBNAIL_FILE="$STAGING/thumb.png"
          if [ ! -f "$THUMBNAIL_FILE" ]; then
            echo "Expected Workshop thumbnail not found: $THUMBNAIL_FILE"
            exit 1
          fi

          WORKSHOP_ID="$(PROFILE_FILE="$PROFILE_FILE" python3 -c 'import xml.etree.ElementTree as ET, os; root = ET.parse(os.environ["PROFILE_FILE"]).getroot(); ids = root.findall(".//WorkshopIds/WorkshopId/Id"); print(((ids[0].text or "").strip()) if ids else "")')"

          if [ -z "$WORKSHOP_ID" ] || [ "$WORKSHOP_ID" = "0" ]; then
            echo "Unable to resolve a valid Workshop ID from $PROFILE_FILE"
            exit 1
          fi

          echo "WORKSHOP_ID=$WORKSHOP_ID" >> "$GITHUB_ENV"
          echo "STAGING_DIR=$STAGING" >> "$GITHUB_ENV"
          echo "PREVIEW_FILE=$THUMBNAIL_FILE" >> "$GITHUB_ENV"

      - name: Setup SteamCMD
        if: ${{ steps.matrix_gate.outputs.should_upload == 'true' }}
        uses: andriivitiv/setup-steamcmd@v1.2.0

      - name: Prune SBMI profile files from upload staging
        if: ${{ steps.matrix_gate.outputs.should_upload == 'true' }}
        run: |
          set -euo pipefail
          rm -f "$STAGING_DIR/modinfo.sbmi.beta" "$STAGING_DIR/modinfo.sbmi.main"

      - name: Create SteamCMD upload script
        if: ${{ steps.matrix_gate.outputs.should_upload == 'true' }}
        run: |
          cat > "$RUNNER_TEMP/workshop_item.vdf" <<EOF
          "workshopitem"
          {
            "appid" "244850"
            "publishedfileid" "${WORKSHOP_ID}"
            "contentfolder" "${STAGING_DIR}"
            "previewfile" "${PREVIEW_FILE}"
            "changenote" "GitHub Actions build ${GITHUB_RUN_NUMBER} (${GITHUB_SHA})"
          }
          EOF

      - name: Install SteamCMD cached credentials config
        if: ${{ steps.matrix_gate.outputs.should_upload == 'true' }}
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          set -euo pipefail
          echo "::add-mask::$STEAM_CONFIG_VDF"

          mkdir -p "$HOME/Steam/config"
          printf '%s' "$STEAM_CONFIG_VDF" > "$HOME/Steam/config/config.vdf"
          chmod 600 "$HOME/Steam/config/config.vdf"
          echo "Wrote Steam cached credentials config to: $HOME/Steam/config/config.vdf"

      - name: Upload to Steam Workshop item
        if: ${{ steps.matrix_gate.outputs.should_upload == 'true' }}
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          set -euo pipefail
          steamcmd +login "$STEAM_USERNAME" +workshop_build_item "$RUNNER_TEMP/workshop_item.vdf" +quit
